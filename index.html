<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="styleme.fr, ton agent IA du matin pour t’aider à t’habiller avec ce que tu as déjà, sans stress, sans pub et sans pression d’achat.">
  <title>styleme.fr — Ton agent IA du matin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F4EFE6;
      --cream: #FCF8F2;
      --beige: #F8F3EC;
      --pink: #B97A56;
      --yellow: #D9BEA8;
      --blue: #4F6B60;
      --magenta: #A96845;
      --gray: #6E6A63;
      --card: #FFFDF9;

      --forest: #2F5144;
      --forest-soft: #4F6B60;
      --text-dark: #24382F;
      --border: rgba(47, 81, 68, 0.12);
      --shadow: rgba(36, 56, 47, 0.10);
    }

    html { scroll-behavior: smooth; }

    body {
      background: linear-gradient(135deg, var(--bg) 0%, var(--cream) 100%);
      color: var(--text-dark);
      font-family: 'Inter', sans-serif;
      line-height: 1.7;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: rgba(244,239,230,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    nav .logo-nav {
      height: 46px;
      width: auto;
      transition: transform 0.3s;
    }

    nav .logo-nav:hover {
      transform: scale(1.03);
    }

    nav .lang-selector {
      display: flex;
      gap: 8px;
      margin-right: 20px;
    }

    nav .lang-btn {
      background: rgba(47,81,68,0.05);
      border: 1px solid rgba(47,81,68,0.12);
      color: var(--gray);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    nav .lang-btn.active {
      background: var(--forest);
      color: #fff;
      border-color: transparent;
    }

    nav .lang-btn:hover:not(.active) {
      border-color: var(--pink);
      color: var(--text-dark);
    }

    nav .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    nav a.cta-nav {
      background: var(--forest);
      color: #fff;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
    }

    nav a.cta-nav:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow);
      background: var(--pink);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(185,122,86,0.08) 0%, transparent 72%);
      pointer-events: none;
      filter: blur(8px);
    }

    .logo-hero {
      width: min(170px, 40vw);
      height: auto;
      margin: 0 auto 26px;
      display: block;
      position: relative;
      z-index: 1;
      opacity: 0.9;
      filter: none;
      object-fit: contain;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .logo-hero:hover {
      transform: translateY(-4px) scale(1.02);
      opacity: 1;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 300;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.22;
      margin-bottom: 20px;
      max-width: 760px;
      position: relative;
      z-index: 1;
      letter-spacing: -0.02em;
      color: var(--forest);
    }

    .hero h1 em {
      font-style: italic;
      background: linear-gradient(135deg, var(--pink), var(--yellow), var(--blue), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p.sub {
      font-size: clamp(15px, 2vw, 18px);
      color: var(--gray);
      max-width: 640px;
      margin: 0 auto 36px;
      font-weight: 300;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }

    .hero .cta-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .btn-main {
      background: var(--forest);
      color: #fff;
      border: none;
      cursor: pointer;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
      font-family: 'Inter', sans-serif;
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-main:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px var(--shadow);
      background: var(--pink);
    }

    .btn-sub {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: 1px;
    }

    section {
      padding: 100px 24px;
      max-width: 900px;
      margin: 0 auto;
      scroll-margin-top: 90px;
    }

    section h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(24px, 4vw, 38px);
      margin-bottom: 40px;
      text-align: center;
      color: var(--forest);
    }

    section h2 span {
      background: linear-gradient(135deg, var(--pink), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .problem,
    .story,
    .steps,
    .difference,
    .for-you,
    .signup,
    .faq {
      border-top: 1px solid var(--border);
    }

    .problem-text {
      font-size: 17px;
      color: var(--gray);
      max-width: 600px;
      margin: 0 auto 30px;
      text-align: center;
      font-weight: 300;
    }

    .thought-bubbles {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-top: 30px;
    }

    .thought {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 22px;
      font-size: 14px;
      color: var(--gray);
      font-style: italic;
      transition: border-color 0.3s, transform 0.3s;
      box-shadow: 0 8px 24px var(--shadow);
    }

    .thought:hover {
      border-color: var(--pink);
      transform: translateY(-2px);
    }

    .problem-punchline {
      text-align: center;
      margin-top: 40px;
      font-size: 16px;
      color: var(--forest);
      font-weight: 500;
    }

    .story {
      background: linear-gradient(180deg, transparent 0%, rgba(185,122,86,0.03) 100%);
    }

    .story-grid,
    .steps-grid,
    .checks {
      display: grid;
      gap: 30px;
    }

    .story-grid {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
      margin-top: 30px;
    }

    .story-moment {
      text-align: center;
      padding: 30px 20px;
    }

    .story-icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    .story-moment h3,
    .step-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 12px;
      color: var(--text-dark);
    }

    .story-moment p,
    .step-card p {
      color: var(--gray);
      font-size: 14px;
      line-height: 1.7;
    }

    .steps-grid {
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      margin-top: 20px;
    }

    .step-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      transition: transform 0.3s, border-color 0.3s;
      box-shadow: 0 8px 24px var(--shadow);
    }

    .step-card:hover {
      transform: translateY(-6px);
      border-color: rgba(185,122,86,0.35);
    }

    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--pink);
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 18px;
    }

    .difference-intro {
      text-align: center;
      color: var(--gray);
      font-size: 15px;
      max-width: 620px;
      margin: 0 auto 24px;
    }
